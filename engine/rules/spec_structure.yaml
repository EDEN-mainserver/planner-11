# 기능명세서 구조 생성 룰

generation_rule:
  source: prd.features
  mapping: 1 feature → 1 spec

sections_per_spec:
  - spec_id: "SPEC-{index:03d}"
  - linked_feature_id: from prd.features[].id
  - title: from prd.features[].title
  - description: LLM 생성
  - priority: from prd.features[].priority
  - user_scenario: LLM 생성 (prd.scenarios 참조)
  - acceptance_criteria: from prd.features[].acceptance_criteria + LLM 보완
  - technical_detail:
      approach: LLM 생성 (automation_context 참조)
      tech_stack: LLM 추론
      input: automation_context.actions[].input_fields 매핑
      output: automation_context.actions[].output_fields 매핑
      selectors: "TODO (수동 확인 필요)"
  - error_cases: LLM 생성 (automation_context.error_handling 참조)
  - test_cases: LLM 생성
