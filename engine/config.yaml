# PlanForge Engine 설정

llm:
  primary:
    provider: gemini
    model: gemini-2.5-pro
    max_tokens: 8192
    temperature: 0.3
  fallback:
    provider: anthropic
    model: claude-sonnet-4-6
    max_tokens: 8192
    temperature: 0.3

validation:
  quality_threshold: 0.8
  max_retries: 2

paths:
  schemas: templates/_schema/
  rules: engine/rules/
  prompts: engine/prompts/
  output: output/
  memory: memory/
