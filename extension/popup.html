<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eden Crawl</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 420px;
      min-height: 200px;
      max-height: 640px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #f8f8fb;
      display: flex;
      flex-direction: column;
    }

    /* ── 헤더 ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      background: #fff;
      border-bottom: 1px solid #ebebeb;
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: #7c3aed;
      letter-spacing: -0.3px;
    }
    .header-title span { color: #1a1a1a; }
    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
    }
    .settings-btn:hover { background: #f3f4f6; color: #6b7280; }

    /* ── 검색 영역 ── */
    .search-area {
      padding: 12px 14px;
      background: #fff;
      border-bottom: 1px solid #ebebeb;
      display: flex;
      gap: 8px;
    }
    .search-input {
      flex: 1;
      padding: 8px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: #7c3aed; }
    .search-input::placeholder { color: #9ca3af; }
    .crawl-btn {
      padding: 8px 16px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .crawl-btn:hover:not(:disabled) { background: #6d28d9; }
    .crawl-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .count-input {
      width: 52px;
      padding: 8px 6px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      outline: none;
      color: #374151;
    }
    .count-input:focus { border-color: #7c3aed; }
    .count-input::-webkit-inner-spin-button { opacity: 0.5; }

    /* ── 설정 패널 ── */
    .settings-panel {
      background: #fafafa;
      border-bottom: 1px solid #ebebeb;
      padding: 12px 14px;
      display: none;
    }
    .settings-panel.open { display: block; }
    .settings-panel label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .settings-panel input {
      width: 100%;
      padding: 7px 10px;
      border: 1.5px solid #e5e7eb;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      margin-bottom: 8px;
      font-family: monospace;
    }
    .settings-panel input:focus { border-color: #7c3aed; }
    .settings-hint {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .save-btn {
      width: 100%;
      padding: 7px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: #374151;
    }
    .save-btn:hover { background: #e5e7eb; }

    /* ── 상태 메시지 ── */
    .status {
      padding: 10px 14px;
      font-size: 12px;
      display: none;
      align-items: center;
      gap-6px;
    }
    .status.info    { background: #eff6ff; color: #1d4ed8; display: flex; }
    .status.success { background: #f0fdf4; color: #15803d; display: flex; }
    .status.warning { background: #fffbeb; color: #92400e; display: flex; }
    .status.error   { background: #fef2f2; color: #dc2626; display: flex; }

    /* ── 결과 영역 ── */
    .results {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px 14px;
    }
    .results-header {
      font-size: 11px;
      color: #6b7280;
      padding: 4px 4px 8px;
    }
    .results-header strong { color: #7c3aed; }

    /* ── 카드 ── */
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      margin-bottom: 7px;
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .card-header:hover { background: #faf5ff; }
    .card-header.expanded { background: #faf5ff; }
    .rank {
      flex-shrink: 0;
      width: 20px;
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
      font-family: monospace;
      margin-top: 1px;
    }
    .card-main { flex: 1; min-width: 0; }
    .card-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
    }
    .author { font-size: 12px; font-weight: 600; color: #7c3aed; }
    .time { font-size: 11px; color: #9ca3af; margin-left: auto; }
    .preview {
      font-size: 12px;
      color: #374151;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-stats {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      font-size: 11px;
      color: #6b7280;
    }

    /* ── 펼쳐진 카드 ── */
    .card-body {
      border-top: 1px solid #f3e8ff;
      padding: 10px 12px;
      display: none;
    }
    .card-body.open { display: block; }
    .post-text {
      font-size: 12px;
      color: #1f2937;
      line-height: 1.6;
      background: #faf5ff;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .ext-link {
      font-size: 11px;
      color: #7c3aed;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 8px;
    }
    .ext-link:hover { text-decoration: underline; }
    .analyze-btn {
      width: 100%;
      padding: 7px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .analyze-btn:hover:not(:disabled) { background: #6d28d9; }
    .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── 분석 결과 ── */
    .analysis-box {
      margin-top: 8px;
      background: #f5f3ff;
      border: 1px solid #e9d5ff;
      border-radius: 8px;
      padding: 10px;
    }
    .analysis-summary {
      font-size: 12px;
      font-weight: 600;
      color: #5b21b6;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }
    .keyword {
      background: #ddd6fe;
      color: #5b21b6;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 99px;
    }
    .factor {
      font-size: 11px;
      color: #4b5563;
      padding: 4px 0;
      border-top: 1px solid #ede9fe;
      line-height: 1.4;
    }
    .factor strong { color: #5b21b6; margin-right: 4px; }
    .analysis-error {
      font-size: 11px;
      color: #dc2626;
      margin-top: 6px;
    }
    .analysis-loading {
      font-size: 11px;
      color: #7c3aed;
      margin-top: 6px;
    }

    /* ── 키워드 배지 (멀티 키워드 모드) ── */
    .kw-badge {
      display: inline-block;
      padding: 1px 6px;
      font-size: 9px;
      font-weight: 700;
      background: #ede9fe;
      color: #6d28d9;
      border-radius: 99px;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    /* ── 빈 상태 ── */
    .empty {
      text-align: center;
      padding: 32px 16px;
      color: #9ca3af;
    }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty-title { font-size: 13px; font-weight: 600; color: #6b7280; margin-bottom: 4px; }
    .empty-desc { font-size: 11px; line-height: 1.5; }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <div class="header-title">Eden <span>Crawl</span> <em style="font-size:10px;font-style:normal;background:#ede9fe;color:#7c3aed;padding:1px 6px;border-radius:99px;font-weight:700;">v2</em></div>
    <button class="settings-btn" id="settings-toggle" title="설정">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- 설정 패널 -->
  <div class="settings-panel" id="settings-panel">
    <p class="settings-hint">Vercel URL 또는 Gemini API 키 중 하나만 입력하면 됩니다.</p>
    <label>Vercel 배포 URL</label>
    <input type="text" id="vercel-url" placeholder="https://your-app.vercel.app" />
    <label>Gemini API Key (직접 호출)</label>
    <input type="password" id="gemini-key" placeholder="AIza..." />
    <button class="save-btn" id="save-settings">저장</button>
  </div>

  <!-- 검색 -->
  <div class="search-area">
    <input
      type="text"
      class="search-input"
      id="keyword"
      placeholder="키워드 (멀티: 마케팅:20, 숏폼:30)"
    />
    <input
      type="number"
      class="count-input"
      id="count-input"
      value="30"
      min="5"
      max="100"
      title="수집 개수"
    />
    <button class="crawl-btn" id="crawl-btn">수집</button>
  </div>

  <!-- 상태 -->
  <div class="status" id="status"></div>

  <!-- 결과 -->
  <div class="results" id="results">
    <div class="empty">
      <div class="empty-icon">🧵</div>
      <div class="empty-title">Threads 인기글 수집</div>
      <div class="empty-desc">키워드를 입력하고 수집 버튼을 누르면<br>실제 게시물을 가져옵니다</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
