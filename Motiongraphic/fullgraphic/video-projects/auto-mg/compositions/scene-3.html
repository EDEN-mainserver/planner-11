<template id="scene-3-template">
  <div
    data-composition-id="scene-3"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="10.00"
  >
    <div class="scene-3-stage">
      <div class="scene-3-title">CTA</div>
    </div>

    <style>
      [data-composition-id="scene-3"] {
        position: absolute;
        inset: 0;
      }
      [data-composition-id="scene-3"] .scene-3-stage {
        width: 1080px;
        height: 1920px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg,#3f1d2e,#7c2d12);
        color: #fff;
        font-family: "Segoe UI", sans-serif;
      }
      [data-composition-id="scene-3"] .scene-3-title {
        font-size: 86px;
        font-weight: 800;
        letter-spacing: 0.04em;
        opacity: 0;
        transform: scale(0.96);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const target = '[data-composition-id="scene-3"] .scene-3-title';
        tl.to(target, { opacity: 1, scale: 1, duration: 0.45, ease: "power2.out" }, 0);
        tl.to(target, { opacity: 1, duration: 9.10, ease: "none" }, 0.45);
        tl.to(target, { opacity: 0, duration: 0.45, ease: "power2.in" }, 9.55);
        tl.set({}, {}, 10.00);
        window.__timelines = window.__timelines || {};
        window.__timelines["scene-3"] = tl;
      })();
