<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>auto-mg</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="auto-mg"
      data-start="0"
      data-duration="30"
      data-width="1080"
      data-height="1920"
    >
      <div
        data-composition-id="scene-1"
        data-composition-src="compositions/scene-1.html"
        data-start="0"
        data-duration="10.00"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>
      <div
        data-composition-id="scene-2"
        data-composition-src="compositions/scene-2.html"
        data-start="10.00"
        data-duration="10.00"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>
      <div
        data-composition-id="scene-3"
        data-composition-src="compositions/scene-3.html"
        data-start="20.00"
        data-duration="10.00"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });
      mainTl.set({}, {}, 30);
      window.__timelines["auto-mg"] = mainTl;
    </script>
  </body>
</html>
